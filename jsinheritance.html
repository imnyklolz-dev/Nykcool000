<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Class</title>
    <h1>JavaScript Inheritance Example</h1>
    <p id="details"></p>
</head>
<body>

    <script>
        class car {
            constructor(brand) {
                this.carname = brand;
            }
            present() {
                return 'I have a ' + this.carname;
            }
        }
        class Model extends car {
            constructor(brand, mod) {
                super(brand);
                this.model = mod;
            }
            show() {
                return this.present() + ', it is a ' + this.model;
            }
        }
        let mycar = new Model("Ford", "Mustang");
        document.getElementById("details").innerText = mycar.show();
    </script>
</body>
</html>
