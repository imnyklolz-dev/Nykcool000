<!DOCTYPE html>
<html>
    <head><title>Class in JavaScript</title></head>
    <h2>JavaScript Class Inheritance</h2>
    <p id="details"></p>
    <p id="greetings"></p>
    <script>
        class Student {
    constructor(name) {
    this.name = name;
    }

    present() {
    return "Hello, I am " + this.name;
    }

    static hello() {
    return "This is a static method";
    }
}

        class Grade extends Student {
    constructor(name, grade) {
    super(name);
    this.studentGrade = grade;
    }

    show() {
    return this.present() + ', ' + this.name + ' - ' + this.studentGrade;
    }
}
let myStudent = new Grade("Tina", "grade 6");
document.getElementById("details").innerHTML =
myStudent.show();
// hello() is a static method cannot be accessed by object
document.getElementById("greetings").innerHTML = Student.hello();
    </script>
</html>
