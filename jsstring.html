<!DOCTYPE html>
<html>
    <head><title>JavaScript String() methods</title></head>
    <body>
        <h1>JavaScript String() methods</h1>
        <p>The javascript string() can convert a number into a string.</p>
        <p id="number_result"></p>
        <p id="string_result"></p>
        <script>
            var x = 70;
            var y = 90;
            document.getElementById("number_result").innerHTML = x + y;
            document.getElementById("string_result").innerHTML = String(x) + String(y); //Does not add the numbers but concatenates them as strings
        </script>
    </body>
</html>
