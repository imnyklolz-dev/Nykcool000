<!DOCTYPE html>
<html>
    <head><title>JavaScript Arrow Functions</title></head>
    <body>
        <h1>JavaScript Arrow Functions</h1>
        <p>This is an example that shows an arrow function with a parameter</p>
        <p id="result"></p>
        <script>
            const add = (a,b) => a + b;
            document.getElementById("result").innerHTML = add(4, 6);
        </script>
    </body>
</html>
