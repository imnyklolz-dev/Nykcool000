<!DOCTYPE html>
<html>
    <head><title>JavaScript Error Handling</title></head>
    <body>
        <h1>JavaScript Error Handling</h1>
        <p>This example shows how to use <b>catch</b> to display an error</p>
        <p id="error_message"></p>
        <script>
            try {
                addalert("Welcome guest!");
            }
            catch(err) {
                document.getElementById("error_message").innerHTML = err.message;
            }
        </script>
    </body>
</html>
