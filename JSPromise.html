<!DOCTYPE html>
<html>
    <head><title>Javascript Promise</title></head>
    <body>
        <h1>Javascript Promise</h1>
        <p id="demo"></p>
        <script>
            function myDisplayer(some) {
                document.getElementById("demo").innerHTML = some;
            }

            function sum(a, b) {
                var sum = a + b;
                myDisplayer(sum);
            }
            let MyPromise = new Promise(function(myResolve, myReject) {
                let x = 0;

                if (x == 0) {
                    myResolve("OK");
                } else {
                    myReject("Error");
                }
            });
            MyPromise.then(
                function(value) {sum(5, 10);},
                function(error) {sum(error);}
            );
        </script>
    </body>
</html>
