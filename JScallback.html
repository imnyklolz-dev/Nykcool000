<!DOCTYPE html>
<html>
    <head><title>JavaScript Object to JSON</title></head>
    <body>
        <h1>JavaScript Object to JSON</h1>
        <p>Do a calculation and show the result</p>
        <p id="result"></p>
        <script>
            function myDisplayer(some) {
                document.getElementById("result").innerHTML = some;
            }
            function myCalculator(num1, num2, myCallback) {
                let sum = num1 + num2;
                myCallback(sum);
            }
            myCalculator(5, 5, myDisplayer);
        </script>
    </body>
